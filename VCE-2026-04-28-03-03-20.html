<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WATCH-TV | المكتبة الشاملة 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #e50914; --bg-black: #050505; --card-bg: #181818; }
        
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-black); color: white; overflow-x: hidden; }
        
        header { 
            padding: 10px 4%; background: rgba(0,0,0,0.85);
            display: flex; justify-content: space-between; align-items: center; 
            position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box;
            backdrop-filter: blur(10px); border-bottom: 1px solid #1a1a1a;
        }

        .logo { color: var(--main-red); font-size: 30px; font-weight: 900; text-decoration: none; cursor: pointer; }

        .hero { 
            height: 60vh; background: linear-gradient(to top, var(--bg-black), transparent 40%), 
            url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1200&h=600&auto=format&fit=crop'); 
            background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 5%;
        }

        .hero-content h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0; text-shadow: 2px 2px 30px #000; }

        .main-content { padding: 40px 4%; margin-top: -50px; position: relative; z-index: 5; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .movie-card { 
            height: 300px; background: var(--card-bg); border-radius: 12px; 
            overflow: hidden; position: relative; cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4); }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-label { 
            position: absolute; bottom: 0; width: 100%; padding: 20px 10px 10px; 
            background: linear-gradient(to top, rgba(0,0,0,1) 40%, transparent); 
            text-align: center; font-weight: 700; font-size: 1.1rem;
        }

        .site-info { font-size: 0.7rem; color: #666; margin-top: 5px; display: block; font-weight: 400; }

        footer { padding: 40px 20px; text-align: center; color: #555; background: #000; margin-top: 50px; }
    </style>
</head>
<body>

<header>

            <div class="card-label">سيرفر المشاهدة 3<span class="site-info">ID: 27745624</span></div>

<script src="https://pl29276923.profitablecpmratenetwork.com/6e/d9/5d/6ed95dff2c35db535e3f5e9ec8a987fa.js"></script>
<script src="https://pl29276925.profitablecpmratenetwork.com/eb/71/8c/eb718c7468e05d1742f5c2e868e7f03f.js"></script>

<script>
    // دالة فتح الرابط الذكي عند النقر
    function go(url) {
        window.open(url, '_blank');
    }

    // دالة تحديث البانرات كل 15 ثانية لضمان ظهورها "واصل"
    function refreshAds() {
        var scripts = [
            'https://pl29276923.profitablecpmratenetwork.com/6e/d9/5d/6ed95dff2c35db535e3f5e9ec8a987fa.js',
            'https://pl29276925.profitablecpmratenetwork.com/eb/71/8c/eb718c7468e05d1742f5c2e868e7f03f.js'
        ];
        scripts.forEach(function(src) {
            var old = document.querySelector('script[src*="' + src.split('/')[3] + '"]');
            if (old) old.remove();
            var s = document.createElement('script');
            s.src = src + "?v=" + Math.random();
            document.body.appendChild(s);
        });
    }
    
    // تشغيل التحديث التلقائي
    setInterval(refreshAds, 15000);
</script>

</body>
</html>
